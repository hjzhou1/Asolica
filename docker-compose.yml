version: '3.8'

services:
  app:
    build: .
    ports:
      - '3200:3200'
    environment:
      # JWT_SECRET 必须显式设置，无默认值（未设置则启动失败）
      - JWT_SECRET=${JWT_SECRET:?错误:请在 .env 文件中设置 JWT_SECRET 环境变量}
      - PORT=3200
      - NODE_ENV=production
      - BASE_URL=${BASE_URL:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-}
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
      - ./server/backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3200/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
