<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f13" />
    <meta name="format-detection" content="telephone=no" />
    <title>Asolica</title>
    <style>
      /* 内联加载占位符：JS 加载失败时用户不会看到完全空白页面 */
      #app:empty::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        width: 28px;
        height: 28px;
        margin: -14px 0 0 -14px;
        border: 3px solid #e5e5e7;
        border-top-color: #0f0f13;
        border-radius: 50%;
        animation: app-loading .7s linear infinite;
      }
      @keyframes app-loading { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;text-align:center;padding:24px;">
        <div>
          <h2 style="font-size:18px;margin:0 0 8px;">需要启用 JavaScript</h2>
          <p style="font-size:14px;color:#666;margin:0;">请在浏览器设置中启用 JavaScript 以使用本站。</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
